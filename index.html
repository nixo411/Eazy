<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eazy Community — Hub</title>
    <style>
        :root {
            --glow-color: #5865F2;
            --bg-gradient: linear-gradient(135deg, #020617, #0f172a, #1e1b4b);
            --panel-bg: rgba(30, 41, 59, 0.45);
            --border-glow: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        /* Ambient Glow Background Effect */
        body::before {
            content: '';
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(88, 101, 242, 0.15) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        .main-container {
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* Glassmorphism Panel Base */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Hero Section */
        header {
            text-align: center;
            position: relative;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(46, 213, 115, 0.15);
            border: 1px solid rgba(46, 213, 115, 0.3);
            color: #2ed573;
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #2ed573;
            border-radius: 50%;
            box-shadow: 0 0 8px #2ed573;
            animation: pulse 2s infinite;
        }

        header h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 15px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: clamp(1.1rem, 2vw, 1.3rem);
            color: #94a3b8;
            max-width: 700px;
            margin: 0 auto 35px auto;
            line-height: 1.6;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 45px;
            background: var(--glow-color);
            color: #ffffff;
            text-decoration: none;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(88, 101, 242, 0.3);
        }

        .cta-btn:hover {
            background: #4752c4;
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(88, 101, 242, 0.5);
        }

        /* Stats Infrastructure */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Features Setup */
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 25px;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .feature-card {
            background: rgba(15, 23, 42, 0.2);
            border: 1px solid var(--border-glow);
            padding: 30px;
            border-radius: 18px;
            transition: border-color 0.3s;
        }

        .feature-card:hover {
            border-color: rgba(88, 101, 242, 0.3);
        }

        .feature-icon {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .feature-card h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #f1f5f9;
        }

        .feature-card p {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Management Panel Layout */
        .management-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        .staff-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.2);
            border: 1px solid var(--border-glow);
            padding: 15px 25px;
            border-radius: 14px;
        }

        .staff-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .staff-avatar-placeholder {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #fff;
        }

        .staff-info h4 {
            font-size: 1.05rem;
            font-weight: 600;
        }

        .staff-info span {
            font-size: 0.85rem;
            color: #64748b;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .status-online { background-color: #2ed573; box-shadow: 0 0 8px #2ed573; }
        .status-idle { background-color: #ffa502; box-shadow: 0 0 8px #ffa502; }
        .status-dnd { background-color: #ff4757; box-shadow: 0 0 8px #ff4757; }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 213, 115, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(46, 213, 115, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 213, 115, 0); }
        }

        @media (max-width: 768px) {
            .glass-panel { padding: 25px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <!-- Main Hub Panel -->
        <header class="glass-panel">
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Serveur Opérationnel</span>
            </div>
            <h1 id="hub-title">Community</h1>
            <p id="hub-desc">Initialisation des modules...</p>
            <a href="#" id="hub-link" class="cta-btn">
                <span>Accéder au Discord</span>
            </a>
        </header>

        <!-- Stats System Data Row -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="stat-total">--</div>
                <div class="stat-label">Membres</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-online">--</div>
                <div class="stat-label font-green">En Ligne</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-projects">--</div>
                <div class="stat-label">Projets Actifs</div>
            </div>
        </section>

        <!-- Core Grid Modules -->
        <section class="glass-panel">
            <h2 class="section-title">⚡ Services & Avantages</h2>
            <div class="features-grid" id="features-mount"></div>
        </section>

        <!-- Organization Structure Panel -->
        <section class="glass-panel">
            <h2 class="section-title">🛡️ Directoire & Administration</h2>
            <div class="management-section" id="staff-mount"></div>
        </section>

    </div>

    <!-- Core Pipeline Data Mounting -->
    <script src="config.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof COMMUNITY_CONFIG === 'undefined') {
                console.error("Configuration file parsing failed. Verify config.js syntax.");
                return;
            }

            const { meta, stats, features, staff } = COMMUNITY_CONFIG;

            // Mount Meta Profile
            if(meta.name) document.getElementById('hub-title').innerText = meta.name;
            if(meta.description) document.getElementById('hub-desc').innerText = meta.description;
            if(meta.inviteUrl) document.getElementById('hub-link').href = meta.inviteUrl;

            // Mount Metrics
            if(stats) {
                document.getElementById('stat-total').innerText = stats.totalMembers || "0";
                document.getElementById('stat-online').innerText = stats.onlineNow || "0";
                document.getElementById('stat-projects').innerText = stats.projectsLaunched || "0";
            }

            // Render Modules Grid
            if(features && features.length > 0) {
                const featuresContainer = document.getElementById('features-mount');
                featuresContainer.innerHTML = features.map(item => `
                    <div class="feature-card">
                        <div class="feature-icon">${item.icon || '🛸'}</div>
                        <h3>${item.title}</h3>
                        <p>${item.description}</p>
                    </div>
                `).join('');
            }

            // Render Staff Panel Profile Cards
            if(staff && staff.length > 0) {
                const staffContainer = document.getElementById('staff-mount');
                staffContainer.innerHTML = staff.map(member => `
                    <div class="staff-row">
                        <div class="staff-profile">
                            <div class="staff-avatar-placeholder" style="background-color: ${member.color || '#475569'}">
                                ${member.name.charAt(0).toUpperCase()}
                            </div>
                            <div class="staff-info">
                                <h4>${member.name}</h4>
                                <span>${member.role}</span>
                            </div>
                        </div>
                        <div class="status-indicator status-${member.status || 'offline'}"></div>
                    </div>
                `).join('');
            }
        });
    </script>
</body>
</html>
